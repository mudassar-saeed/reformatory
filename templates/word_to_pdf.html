{% extends "base.html" %}

{% block title %}Word → PDF{% endblock %}

{% block content %}

<div class="flex items-center justify-center min-h-[80vh]">
    <div class="bg-white shadow-xl rounded-xl p-8 w-full max-w-md">

        <!-- Back link -->
        <a href="/" class="text-sm text-gray-400 hover:text-gray-600 flex items-center gap-1 mb-5">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7"/>
            </svg>
            Back
        </a>

        <h2 class="text-2xl font-bold text-gray-800 mb-6 text-center">
            Word to PDF Converter
        </h2>

        <form id="uploadForm" enctype="multipart/form-data">

            <!-- Drag & Drop Zone -->
            <div id="dropArea"
                 class="border-2 border-dashed border-rose-400 rounded-lg p-6 text-center cursor-pointer hover:bg-rose-50 transition">
                <div class="flex flex-col items-center gap-2">
                    <svg class="w-10 h-10 text-rose-400" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round"
                              d="M7 21h10a2 2 0 002-2V9.414a1 1 0 00-.293-.707l-5.414-5.414A1 1 0 0012.586 3H7a2 2 0 00-2 2v14a2 2 0 002 2z"/>
                    </svg>
                    <p class="text-gray-600 font-medium">Drag & Drop your Word file here</p>
                    <p class="text-sm text-gray-400">or click to browse (.docx)</p>
                </div>
                <input type="file" name="file" id="fileInput" accept=".docx" required class="hidden">
            </div>

            <p id="fileName" class="text-sm text-gray-600 mt-3 text-center"></p>

            <!-- Error message -->
            <p id="errorMsg" class="text-sm text-red-500 mt-2 text-center hidden"></p>

            <button id="convertBtn" type="submit"
                class="w-full mt-6 bg-rose-600 hover:bg-rose-700 text-white font-medium py-2 rounded-lg transition duration-300 flex items-center justify-center gap-2">

                <span id="btnText">Convert to PDF</span>

                <!-- Spinner -->
                <svg id="btnSpinner" class="w-5 h-5 animate-spin hidden" fill="none" viewBox="0 0 24 24">
                    <circle class="opacity-25" cx="12" cy="12" r="10" stroke="white" stroke-width="4"></circle>
                    <path class="opacity-75" fill="white" d="M4 12a8 8 0 018-8v4a4 4 0 00-4 4H4z"></path>
                </svg>

                <!-- Tick -->
                <svg id="btnSuccess" class="w-5 h-5 hidden" fill="none" stroke="white" stroke-width="3" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"/>
                </svg>

            </button>

        </form>
    </div>
</div>

{% endblock %}

{% block scripts %}
<script>
const dropArea   = document.getElementById("dropArea");
const fileInput  = document.getElementById("fileInput");
const fileNameEl = document.getElementById("fileName");
const errorMsg   = document.getElementById("errorMsg");
const uploadForm = document.getElementById("uploadForm");
const convertBtn = document.getElementById("convertBtn");
const btnText    = document.getElementById("btnText");
const btnSpinner = document.getElementById("btnSpinner");
const btnSuccess = document.getElementById("btnSuccess");

dropArea.addEventListener("click", () => fileInput.click());

fileInput.addEventListener("change", () => {
    if (fileInput.files.length > 0) {
        fileNameEl.textContent = "Selected: " + fileInput.files[0].name;
        errorMsg.classList.add("hidden");
    }
});

["dragenter", "dragover", "dragleave", "drop"].forEach(ev =>
    dropArea.addEventListener(ev, e => e.preventDefault())
);

dropArea.addEventListener("dragover",  () => dropArea.classList.add("bg-rose-100"));
dropArea.addEventListener("dragleave", () => dropArea.classList.remove("bg-rose-100"));

dropArea.addEventListener("drop", (e) => {
    dropArea.classList.remove("bg-rose-100");
    if (e.dataTransfer.files.length > 0) {
        fileInput.files = e.dataTransfer.files;
        fileNameEl.textContent = "Selected: " + e.dataTransfer.files[0].name;
        errorMsg.classList.add("hidden");
    }
});

function showError(msg) {
    errorMsg.textContent = msg;
    errorMsg.classList.remove("hidden");
}

function resetBtn(label) {
    btnText.textContent = label;
    btnSpinner.classList.add("hidden");
    btnSuccess.classList.add("hidden");
    convertBtn.disabled = false;
}

uploadForm.addEventListener("submit", async (e) => {
    e.preventDefault();
    errorMsg.classList.add("hidden");

    if (!fileInput.files.length) {
        showError("Please select a file.");
        return;
    }

    convertBtn.disabled = true;
    btnText.textContent  = "Converting...";
    btnSpinner.classList.remove("hidden");
    btnSuccess.classList.add("hidden");

    const formData = new FormData();
    formData.append("file", fileInput.files[0]);

    try {
        const response = await fetch("/word_to_pdf", {
            method: "POST",
            body: formData
        });

        if (!response.ok) {
            // FIX: Parse JSON error from server instead of showing a blob
            const errData = await response.json().catch(() => ({ error: "Conversion failed." }));
            throw new Error(errData.error || "Conversion failed.");
        }

        const blob = await response.blob();
        const url  = window.URL.createObjectURL(blob);
        const a    = document.createElement("a");
        a.href     = url;
        a.download = "converted.pdf";
        document.body.appendChild(a);
        a.click();
        a.remove();
        window.URL.revokeObjectURL(url);

        btnSpinner.classList.add("hidden");
        btnSuccess.classList.remove("hidden");
        btnText.textContent = "Done!";

        setTimeout(() => resetBtn("Convert to PDF"), 1500);

    } catch (err) {
        btnSpinner.classList.add("hidden");
        showError(err.message || "An error occurred.");
        setTimeout(() => resetBtn("Convert to PDF"), 2000);
    }
});
</script>
{% endblock %}
